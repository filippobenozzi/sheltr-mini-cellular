<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#191919">
  <title>Config // Sheltr Cloud</title>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <style>
    :root { --bg:#191919; --section:#282828; --fg:#f0efed; --muted:#bcbab6; --bd:#bcbab6; --s1:4px; --s2:8px; --s3:12px; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,Monaco,Liberation Mono,monospace; }
    * { box-sizing:border-box; }
    body { font:13px/1.35 var(--mono); margin:0; padding:var(--s3); min-height:100vh; display:flex; flex-direction:column; background:var(--bg); color:var(--fg); }
    .brand { display:flex; align-items:center; gap:var(--s2); }
    .logo { width:28px; height:28px; display:block; flex:0 0 28px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--s2); gap:var(--s2); flex-wrap:wrap; }
    h1 { font-size:17px; margin:0; }
    h2 { font-size:14px; margin:0 0 var(--s2); color:var(--muted); }
    .layout { display:grid; gap:var(--s2); }
    .box { background:var(--section); border:1px solid var(--bd); border-radius:6px; padding:var(--s3); }
    .small { font-size:12px; color:var(--muted); margin:0; }
    .row { display:flex; gap:var(--s2); flex-wrap:wrap; align-items:flex-end; }
    .stack { display:grid; gap:var(--s2); }
    label { display:flex; flex-direction:column; gap:var(--s1); font-size:12px; color:var(--muted); min-width:170px; }
    input, select, button { font:12px/1.2 var(--mono); }
    input, select { border:1px solid var(--bd); border-radius:6px; padding:6px; height:32px; background:var(--section); color:var(--fg); }
    button { border:1px solid var(--bd); background:#000; color:#fff; border-radius:6px; padding:6px 10px; height:32px; cursor:pointer; }
    button:hover { background:#111; }
    button.danger { background:#4f1111; border-color:#7d3535; }
    button.danger:hover { background:#662020; }
    .instances { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:var(--s2); }
    .instance-item { border:1px solid var(--bd); border-radius:6px; padding:10px; background:#111; }
    .instance-item.active { background:#111; border-color:#fff; }
    .instance-title { margin:0 0 6px; font-size:15px; font-weight:800; color:#AFB42B; line-height:1.1; }
    .meta { color:var(--muted); font-size:11px; }
    .instance-links { display:flex; align-items:center; gap:var(--s1); margin-top:8px; width:100%; }
    .instance-link { display:inline-flex; align-items:center; color:#fff; text-decoration:none; border:1px solid var(--bd); border-radius:6px; padding:0 10px; height:32px; font-size:12px; background:#000; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .instance-link:hover { background:#111; }
    .copy-icon { min-width:32px; padding:0 8px; height:32px; font-size:14px; line-height:1; }
    .instance-actions { display:flex; gap:var(--s1); margin-top:8px; }
    .selected-instance { margin-top:6px; font-size:12px; color:#AFB42B; font-weight:700; }
    .board { border:1px solid var(--bd); border-radius:6px; padding:var(--s2); margin:var(--s2) 0; background:var(--section); }
    .board h3 { font-size:13px; margin:0; }
    .board-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--s2); }
    .channels { border-top:1px dashed var(--bd); margin-top:var(--s2); padding-top:var(--s2); display:grid; gap:6px; }
    .channel { display:grid; grid-template-columns:56px 1fr 140px; gap:var(--s2); align-items:center; }
    .msg { margin-top:var(--s2); white-space:pre-wrap; font-size:12px; border:1px solid var(--bd); border-radius:6px; padding:var(--s2); min-height:24px; background:var(--section); }
    a.nav { color:var(--fg); text-decoration:none; border:1px solid var(--bd); border-radius:6px; padding:6px 10px; background:var(--section); font-size:12px; }
    a.nav:hover { background:#2b2b2b; }
    .foot { margin-top:auto; padding:var(--s3) 0 2px; text-align:center; font-style:italic; font:12px/1.3 var(--mono); color:var(--muted); }
    .foot a { color:inherit; }
    .hidden { display:none; }
    @media (max-width: 720px) { .channel { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><img class="logo" src="/static/logo.svg" alt="Logo"><h1>Config // Sheltr Cloud</h1></div>
    <button id="configLogout" type="button" class="hidden">Logout config</button>
  </div>

  <section class="box stack hidden" id="configLoginBox">
    <h2>Login Configurazione</h2>
    <div class="row">
      <label>Username config<input id="configUser" autocomplete="username"></label>
      <label>Password config<input id="configPass" type="password" autocomplete="current-password"></label>
      <button id="configLoginBtn" type="button">Accedi</button>
    </div>
    <p class="small">Credenziali impostate da `.env` (`CONFIG_AUTH_USERNAME` / `CONFIG_AUTH_PASSWORD`).</p>
  </section>

  <main class="layout hidden" id="configMain">
    <section class="box stack">
      <h2>Istanze</h2>
      <form id="createForm" class="row">
        <label>ID istanza<input id="newId" placeholder="es. casa-demo" required></label>
        <label>Nome istanza<input id="newName" placeholder="es. Casa Demo" required></label>
        <button type="submit">Crea istanza</button>
      </form>
      <div class="instances" id="instances"></div>
      <div id="selectedInstance" class="selected-instance hidden"></div>
    </section>

    <section class="box">
      <div id="emptyState" class="small">Crea o seleziona una istanza.</div>
      <div id="editor" class="hidden">
        <h2 id="instanceTitle">Istanza</h2>
        <div class="row">
          <label>ID istanza<input id="instanceId" placeholder="es. casa-demo"></label>
          <label>Nome istanza<input id="instanceName"></label>
          <label>Topic comandi luci<input id="lightTopicInput"></label>
          <label>Topic risposta DR154<input id="lightResponseTopicInput" placeholder="es. dr154/casa-demo/pub/light"></label>
          <label>Formato payload
            <select id="lightPayloadFormat">
              <option value="frame_hex_space">Frame HEX con spazi</option>
              <option value="frame_hex_compact">Frame HEX compatto</option>
              <option value="frame_hex_space_crlf">Frame HEX con spazi + CRLF</option>
              <option value="frame_hex_compact_crlf">Frame HEX compatto + CRLF</option>
              <option value="frame_bytes">Frame bytes raw</option>
              <option value="json">JSON</option>
            </select>
          </label>
          <label>Versione protocollo<input id="protocolVersion" value="1.6" readonly></label>
          <label>Schede<input id="boardsCount" readonly></label>
        </div>

        <div class="row" style="margin-top:8px;">
          <label>Username login controllo<input id="authUsername" placeholder="es. filippo"></label>
          <label>Password login controllo
            <input id="authPassword" type="text" placeholder="Visibile: nuova password o vuoto">
          </label>
          <label>Rimuovi password controllo<input id="authPasswordClear" type="checkbox"></label>
        </div>

        <div class="row" style="margin-top:8px;">
          <button id="addBoard" type="button">Aggiungi scheda</button>
          <button id="saveBtn" type="button">Salva</button>
          <button id="publishBtn" type="button">Pubblica su MQTT</button>
          <button id="deleteBtn" class="danger" type="button">Elimina istanza</button>
        </div>

        <div id="boards"></div>
      </div>
      <pre class="msg" id="msg"></pre>
    </section>
  </main>

  <footer class="foot">not all those who wander are lost ~ <a href="https://filippo.im" target="_blank" rel="noopener">filippo.im</a></footer>

  <script>
    const KIND_META = {
      light: { label: "Luci", maxChannels: 8, prefix: "Luce" },
      shutter: { label: "Tapparelle", maxChannels: 4, prefix: "Tapparella" },
      dimmer: { label: "Dimmer", maxChannels: 1, prefix: "Dimmer" },
      thermostat: { label: "Termostati", maxChannels: 1, prefix: "Termostato" }
    };

    const state = {
      instances: [],
      current: null,
      currentId: null,
      mqttBaseTopic: "dr154",
      configAuthRequired: false,
      configToken: ""
    };

    const el = {
      configMain: document.getElementById("configMain"),
      configLoginBox: document.getElementById("configLoginBox"),
      configUser: document.getElementById("configUser"),
      configPass: document.getElementById("configPass"),
      configLoginBtn: document.getElementById("configLoginBtn"),
      configLogout: document.getElementById("configLogout"),
      createForm: document.getElementById("createForm"),
      newId: document.getElementById("newId"),
      newName: document.getElementById("newName"),
      instances: document.getElementById("instances"),
      selectedInstance: document.getElementById("selectedInstance"),
      emptyState: document.getElementById("emptyState"),
      editor: document.getElementById("editor"),
      instanceTitle: document.getElementById("instanceTitle"),
      instanceId: document.getElementById("instanceId"),
      instanceName: document.getElementById("instanceName"),
      lightTopicInput: document.getElementById("lightTopicInput"),
      lightResponseTopicInput: document.getElementById("lightResponseTopicInput"),
      lightPayloadFormat: document.getElementById("lightPayloadFormat"),
      protocolVersion: document.getElementById("protocolVersion"),
      boardsCount: document.getElementById("boardsCount"),
      authUsername: document.getElementById("authUsername"),
      authPassword: document.getElementById("authPassword"),
      authPasswordClear: document.getElementById("authPasswordClear"),
      addBoard: document.getElementById("addBoard"),
      saveBtn: document.getElementById("saveBtn"),
      publishBtn: document.getElementById("publishBtn"),
      deleteBtn: document.getElementById("deleteBtn"),
      boards: document.getElementById("boards"),
      msg: document.getElementById("msg")
    };

    function note(text, isError = false) {
      el.msg.textContent = text || "";
      el.msg.style.color = isError ? "#ff8a80" : "var(--fg)";
    }

    function toInt(value, fallback) {
      const n = Number(value);
      return Number.isFinite(n) ? Math.trunc(n) : fallback;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function cleanText(value, fallback = "") {
      const txt = String(value ?? "").trim();
      return txt || fallback;
    }

    function slugify(value, fallback) {
      const out = cleanText(value, fallback).toLowerCase().replace(/_/g, "-").replace(/[^a-z0-9-]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
      return out || fallback;
    }

    function defaultChannelName(kind, channel) {
      return `${KIND_META[kind]?.prefix || "Canale"} ${channel}`;
    }

    function defaultLightTopic(instanceId) {
      return `${state.mqttBaseTopic}/${instanceId}/cmd/light`;
    }

    function defaultLightResponseTopic(instanceId) {
      return `${state.mqttBaseTopic}/${instanceId}/pub/light`;
    }

    function controlUrl(instanceId) {
      return `/control/${encodeURIComponent(instanceId)}`;
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (_) {
        /* fallback */
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try {
        ok = document.execCommand("copy");
      } catch (_) {
        ok = false;
      }
      document.body.removeChild(ta);
      return ok;
    }

    function configTokenKey() {
      return "sheltr-config-token";
    }

    function setConfigAccess(allowed) {
      el.configMain.classList.toggle("hidden", !allowed);
      el.configLoginBox.classList.toggle("hidden", allowed || !state.configAuthRequired);
      el.configLogout.classList.toggle("hidden", !state.configAuthRequired || !allowed);
    }

    function handleConfigAuthError(err) {
      if (err && err.status === 401) {
        state.configToken = "";
        localStorage.removeItem(configTokenKey());
        setConfigAccess(false);
        note("Sessione configurazione scaduta o non valida. Effettua il login config.", true);
        return true;
      }
      return false;
    }

    function normalizeBoard(raw, index) {
      const board = raw && typeof raw === "object" ? raw : {};
      const kind = KIND_META[board.kind] ? board.kind : "light";
      const max = KIND_META[kind].maxChannels;
      const id = slugify(board.id || board.name || `board-${index + 1}`, `board-${index + 1}`);
      const name = cleanText(board.name, id);
      const address = clamp(toInt(board.address, index + 1), 0, 254);
      let channelStart = clamp(toInt(board.channelStart, 1), 1, max);
      let channelEnd = clamp(toInt(board.channelEnd, max), 1, max);
      if (channelEnd < channelStart) channelEnd = channelStart;

      const byChannel = new Map();
      for (const item of Array.isArray(board.channels) ? board.channels : []) {
        const ch = clamp(toInt(item?.channel, -1), 1, max);
        if (ch >= channelStart && ch <= channelEnd) byChannel.set(ch, item || {});
      }

      const channels = [];
      for (let ch = channelStart; ch <= channelEnd; ch += 1) {
        const saved = byChannel.get(ch) || {};
        const item = {
          channel: ch,
          name: cleanText(saved.name, defaultChannelName(kind, ch)),
          room: cleanText(saved.room, "Senza stanza")
        };
        if (kind === "light" || kind === "shutter" || kind === "thermostat") {
          item.profile = (saved.profile && typeof saved.profile === "object") ? saved.profile : { enabled: false, entries: [] };
        }
        channels.push(item);
      }

      return { id, name, address, kind, channelStart, channelEnd, channels };
    }

    async function api(path, options = {}, useConfigAuth = true) {
      const method = String(options.method || "GET").toUpperCase();
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      let url = path;
      let body = options.body;
      if (useConfigAuth && state.configToken) {
        headers["X-Config-Token"] = state.configToken;
        const sep = url.includes("?") ? "&" : "?";
        url = `${url}${sep}configToken=${encodeURIComponent(state.configToken)}`;
        if (method !== "GET" && method !== "HEAD" && String(headers["Content-Type"]).includes("application/json")) {
          if (typeof body === "string") {
            try {
              const parsed = JSON.parse(body);
              if (!("configToken" in parsed)) {
                parsed.configToken = state.configToken;
                body = JSON.stringify(parsed);
              }
            } catch (_) {
              /* non-json body */
            }
          } else if (body == null) {
            body = JSON.stringify({ configToken: state.configToken });
          }
        }
      }
      const res = await fetch(url, { ...options, headers, body });
      const out = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = new Error(out.error || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return out;
    }

    function forcedInstanceFromUrl() {
      const parts = location.pathname.split("/").filter(Boolean);
      if (parts[0] === "instance" && parts[1]) return decodeURIComponent(parts[1]);
      const q = new URLSearchParams(location.search).get("instance");
      return q || "";
    }

    function renderInstances() {
      el.instances.innerHTML = "";
      el.selectedInstance.classList.toggle("hidden", !state.current);
      el.selectedInstance.textContent = state.current ? `Istanza selezionata: ${state.current.name} (${state.current.id})` : "";
      if (!state.instances.length) {
        const p = document.createElement("p");
        p.className = "small";
        p.textContent = "Nessuna istanza.";
        el.instances.appendChild(p);
        return;
      }

      for (const item of state.instances) {
        const box = document.createElement("div");
        box.className = `instance-item${item.id === state.currentId ? " active" : ""}`;

        const left = document.createElement("div");
        const b = document.createElement("div");
        b.className = "instance-title";
        b.textContent = item.name;
        const m = document.createElement("div");
        m.className = "meta";
        m.textContent = `${item.id} • ${item.boardsCount} schede${item.authRequired ? " • login" : ""}`;
        left.appendChild(b);
        left.appendChild(m);
        const linkRow = document.createElement("div");
        linkRow.className = "instance-links";
        const path = controlUrl(item.id);
        const fullUrl = `${window.location.origin}${path}`;
        const open = document.createElement("a");
        open.className = "instance-link";
        open.href = path;
        open.target = "_blank";
        open.rel = "noopener";
        open.title = fullUrl;
        open.textContent = fullUrl;
        const copy = document.createElement("button");
        copy.type = "button";
        copy.className = "copy-icon";
        copy.title = "Copia link controllo";
        copy.setAttribute("aria-label", "Copia link controllo");
        copy.innerHTML = "&#128203;";
        copy.onclick = async () => {
          const ok = await copyText(fullUrl);
          note(ok ? `Link copiato: ${fullUrl}` : "Copia non riuscita", !ok);
        };
        linkRow.appendChild(open);
        linkRow.appendChild(copy);
        left.appendChild(linkRow);

        const actions = document.createElement("div");
        actions.className = "instance-actions";
        const selectBtn = document.createElement("button");
        selectBtn.type = "button";
        selectBtn.textContent = item.id === state.currentId ? "Selezionata" : "Seleziona";
        selectBtn.disabled = item.id === state.currentId;
        selectBtn.onclick = () => loadInstance(item.id);
        actions.appendChild(selectBtn);
        left.appendChild(actions);

        box.appendChild(left);
        el.instances.appendChild(box);
      }
    }

    function renderEditor() {
      if (!state.current) {
        el.emptyState.classList.remove("hidden");
        el.editor.classList.add("hidden");
        el.boards.innerHTML = "";
        return;
      }

      el.emptyState.classList.add("hidden");
      el.editor.classList.remove("hidden");

      el.instanceTitle.textContent = `Istanza: ${state.current.name}`;
      el.instanceId.value = cleanText(state.current.id, "");
      el.instanceName.value = cleanText(state.current.name, state.current.id);
      el.protocolVersion.value = state.current.protocolVersion || "1.6";
      el.lightTopicInput.value = cleanText(state.current?.mqtt?.lightCommandTopic, defaultLightTopic(state.current.id));
      el.lightResponseTopicInput.value = cleanText(state.current?.mqtt?.lightResponseTopic, defaultLightResponseTopic(state.current.id));
      el.lightPayloadFormat.value = cleanText(state.current?.mqtt?.lightPayloadFormat, "frame_hex_space_crlf");
      el.authUsername.value = cleanText(state.current?.auth?.username, "");
      el.authPassword.value = "";
      el.authPasswordClear.checked = false;
      el.boardsCount.value = String((state.current.boards || []).length);

      renderBoards();
    }

    function renderBoards() {
      state.current.boards = (state.current.boards || []).map((x, i) => normalizeBoard(x, i));
      el.boardsCount.value = String(state.current.boards.length);
      el.boards.innerHTML = "";

      if (!state.current.boards.length) {
        const p = document.createElement("p");
        p.className = "small";
        p.textContent = "Nessuna scheda.";
        el.boards.appendChild(p);
        return;
      }

      state.current.boards.forEach((board, bi) => {
        const wrap = document.createElement("article");
        wrap.className = "board";

        const head = document.createElement("div");
        head.className = "board-head";
        const title = document.createElement("h3");
        title.textContent = `Scheda ${bi + 1} • ${KIND_META[board.kind].label}`;
        const del = document.createElement("button");
        del.type = "button";
        del.className = "danger";
        del.textContent = "Rimuovi";
        del.onclick = () => { state.current.boards.splice(bi, 1); renderBoards(); };
        head.appendChild(title);
        head.appendChild(del);
        wrap.appendChild(head);

        const row = document.createElement("div");
        row.className = "row";

        function field(label, value, onChange, type = "text") {
          const l = document.createElement("label");
          l.textContent = label;
          const i = document.createElement("input");
          i.type = type;
          i.value = value;
          i.onchange = () => onChange(i.value);
          l.appendChild(i);
          return { l, i };
        }

        const idF = field("ID scheda", board.id, (v) => { board.id = slugify(v, `board-${bi + 1}`); renderBoards(); });
        row.appendChild(idF.l);
        const nameF = field("Nome scheda", board.name, (v) => { board.name = cleanText(v, board.id); });
        row.appendChild(nameF.l);

        const kindL = document.createElement("label");
        kindL.textContent = "Tipo";
        const kindS = document.createElement("select");
        for (const [val, meta] of Object.entries(KIND_META)) {
          const o = document.createElement("option");
          o.value = val;
          o.textContent = meta.label;
          if (val === board.kind) o.selected = true;
          kindS.appendChild(o);
        }
        kindS.onchange = () => { board.kind = KIND_META[kindS.value] ? kindS.value : "light"; state.current.boards[bi] = normalizeBoard(board, bi); renderBoards(); };
        kindL.appendChild(kindS);
        row.appendChild(kindL);

        const addrF = field("Indirizzo", String(board.address), (v) => { board.address = clamp(toInt(v, board.address), 0, 254); }, "number");
        addrF.i.min = "0"; addrF.i.max = "254";
        row.appendChild(addrF.l);

        const max = KIND_META[board.kind].maxChannels;
        const fromF = field("Canale da", String(board.channelStart), (v) => { board.channelStart = clamp(toInt(v, board.channelStart), 1, max); state.current.boards[bi] = normalizeBoard(board, bi); renderBoards(); }, "number");
        fromF.i.min = "1"; fromF.i.max = String(max);
        row.appendChild(fromF.l);
        const toF = field("Canale a", String(board.channelEnd), (v) => { board.channelEnd = clamp(toInt(v, board.channelEnd), 1, max); state.current.boards[bi] = normalizeBoard(board, bi); renderBoards(); }, "number");
        toF.i.min = "1"; toF.i.max = String(max);
        row.appendChild(toF.l);

        wrap.appendChild(row);

        const channels = document.createElement("div");
        channels.className = "channels";
        board.channels.forEach((ch, ci) => {
          const c = document.createElement("div");
          c.className = "channel";
          const id = document.createElement("div");
          id.className = "small";
          id.textContent = `C${ch.channel}`;
          const n = document.createElement("input");
          n.value = ch.name;
          n.oninput = () => { board.channels[ci].name = cleanText(n.value, defaultChannelName(board.kind, ch.channel)); };
          const r = document.createElement("input");
          r.value = ch.room;
          r.oninput = () => { board.channels[ci].room = cleanText(r.value, "Senza stanza"); };
          c.appendChild(id); c.appendChild(n); c.appendChild(r);
          channels.appendChild(c);
        });
        wrap.appendChild(channels);

        el.boards.appendChild(wrap);
      });
    }

    function currentPayload() {
      if (!state.current) return null;
      state.current.boards = (state.current.boards || []).map((x, i) => normalizeBoard(x, i));
      return {
        id: slugify(el.instanceId.value, state.current.id),
        name: cleanText(el.instanceName.value, state.current.id),
        protocolVersion: "1.6",
        mqtt: {
          lightCommandTopic: cleanText(el.lightTopicInput.value, defaultLightTopic(state.current.id)),
          lightResponseTopic: cleanText(el.lightResponseTopicInput.value, defaultLightResponseTopic(state.current.id)),
          lightPayloadFormat: cleanText(el.lightPayloadFormat.value, "frame_hex_space_crlf")
        },
        auth: {
          username: cleanText(el.authUsername.value, ""),
          password: cleanText(el.authPassword.value, ""),
          clearPassword: !!el.authPasswordClear.checked
        },
        boards: state.current.boards
      };
    }

    async function loadInstances(preferredId = "") {
      const res = await api("/api/config/instances");
      state.instances = Array.isArray(res.instances) ? res.instances : [];
      if (preferredId && state.instances.some((x) => x.id === preferredId)) return loadInstance(preferredId);
      if (state.currentId && state.instances.some((x) => x.id === state.currentId)) return loadInstance(state.currentId);
      state.current = null; state.currentId = null; renderEditor();
      renderInstances();
    }

    async function loadInstance(instanceId) {
      const id = slugify(instanceId, "dr154-1");
      const res = await api(`/api/config/instances/${encodeURIComponent(id)}`);
      state.current = res.instance;
      state.currentId = res.instance.id;
      renderInstances();
      renderEditor();
    }

    async function createInstance(ev) {
      ev.preventDefault();
      try {
        const id = slugify(el.newId.value, "dr154-1");
        const name = cleanText(el.newName.value, id);
        await api("/api/config/instances", {
          method: "POST",
          body: JSON.stringify({
            id,
            name,
            auth: { username: "", password: "" },
            boards: []
          })
        });
        el.newId.value = "";
        el.newName.value = "";
        note(`Istanza '${id}' creata.`);
        await loadInstances(id);
      } catch (err) {
        if (handleConfigAuthError(err)) return;
        note(err.message, true);
      }
    }

    async function saveCurrent(silent = false) {
      if (!state.current) return null;
      const payload = currentPayload();
      const fromId = state.current.id;
      const res = await api(`/api/config/instances/${encodeURIComponent(fromId)}`, {
        method: "PUT",
        body: JSON.stringify(payload)
      });
      state.current = res.instance;
      state.currentId = res.instance.id;
      if (!silent) note("Configurazione salvata.");
      el.authPassword.value = "";
      el.authPasswordClear.checked = false;
      await loadInstances(state.current.id);
      return res.instance;
    }

    async function publishCurrent() {
      if (!state.current) return;
      try {
        const saved = await saveCurrent(true);
        const res = await api(`/api/config/instances/${encodeURIComponent(saved.id)}/publish`, {
          method: "POST",
          body: JSON.stringify({})
        });
        note(`Configurazione pubblicata su '${res.topic}'.`);
      } catch (err) {
        if (handleConfigAuthError(err)) return;
        note(err.message, true);
      }
    }

    async function deleteCurrent() {
      if (!state.current) return;
      if (!window.confirm(`Eliminare istanza '${state.current.id}'?`)) return;
      try {
        const id = state.current.id;
        await api(`/api/config/instances/${encodeURIComponent(id)}`, { method: "DELETE" });
        note(`Istanza '${id}' eliminata.`);
        await loadInstances("");
      } catch (err) {
        if (handleConfigAuthError(err)) return;
        note(err.message, true);
      }
    }

    function addBoard() {
      if (!state.current) return;
      state.current.boards.push(normalizeBoard({}, state.current.boards.length));
      renderBoards();
    }

    async function configLogin() {
      try {
        const out = await api("/api/config/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: cleanText(el.configUser.value, ""),
            password: cleanText(el.configPass.value, "")
          })
        }, false);
        state.configToken = cleanText(out.token, "");
        if (state.configAuthRequired && !state.configToken) throw new Error("Token configurazione non valido");
        if (state.configToken) localStorage.setItem(configTokenKey(), state.configToken);
        el.configPass.value = "";
        setConfigAccess(true);
        await loadInstances(slugify(forcedInstanceFromUrl(), ""));
        note("Login configurazione eseguito.");
      } catch (err) {
        if (handleConfigAuthError(err)) return;
        note(err.message, true);
      }
    }

    async function configLogout() {
      try {
        await api("/api/config/auth/logout", { method: "POST" }, true);
      } catch (_) {
        /* ignore */
      }
      state.configToken = "";
      localStorage.removeItem(configTokenKey());
      setConfigAccess(false);
      state.instances = [];
      state.current = null;
      state.currentId = null;
      renderInstances();
      renderEditor();
      note("Logout configurazione eseguito.");
    }

    async function bootstrap() {
      try {
        const authMeta = await api("/api/config/auth", {}, false);
        state.configAuthRequired = !!authMeta.required;
        el.configUser.value = cleanText(authMeta.username, "");
        state.configToken = cleanText(localStorage.getItem(configTokenKey()), "");

        const meta = await api("/api/config/meta", {}, !state.configAuthRequired || !!state.configToken);
        state.mqttBaseTopic = cleanText(meta.mqttBaseTopic, "dr154");
      } catch (_) {
        state.mqttBaseTopic = "dr154";
      }

      if (state.configAuthRequired && !state.configToken) {
        setConfigAccess(false);
        note("Login configurazione richiesto.");
        return;
      }

      setConfigAccess(true);
      try {
        await loadInstances(slugify(forcedInstanceFromUrl(), ""));
        note("Pronto.");
      } catch (err) {
        if (!handleConfigAuthError(err)) note(err.message, true);
      }
    }

    el.createForm.addEventListener("submit", createInstance);
    el.addBoard.addEventListener("click", addBoard);
    el.saveBtn.addEventListener("click", () => saveCurrent(false).catch((err) => { if (!handleConfigAuthError(err)) note(err.message, true); }));
    el.publishBtn.addEventListener("click", publishCurrent);
    el.deleteBtn.addEventListener("click", deleteCurrent);
    el.configLoginBtn.addEventListener("click", configLogin);
    el.configPass.addEventListener("keydown", (ev) => { if (ev.key === "Enter") configLogin(); });
    el.configLogout.addEventListener("click", configLogout);

    bootstrap().catch((err) => { if (!handleConfigAuthError(err)) note(err.message, true); });
  </script>
</body>
</html>
